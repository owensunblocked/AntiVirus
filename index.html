<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SentinelX Security</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    overflow:hidden;
}

/* HEADER */
header {
    padding:20px;
    background:#020617;
    border-bottom:1px solid #1e293b;
}

/* HERO */
#hero {
    text-align:center;
    padding:100px;
}

button {
    padding:15px 30px;
    font-size:18px;
    background:#22c55e;
    border:none;
    cursor:pointer;
}

/* SCANNER */
#scanner {
    display:none;
    text-align:center;
    padding-top:100px;
}

.bar {
    width:60%;
    height:20px;
    background:#1e293b;
    margin:auto;
}
.progress {
    height:100%;
    width:0%;
    background:#22c55e;
}

/* ALERT */
#alert {
    display:none;
    position:fixed;
    top:20px;
    right:20px;
    background:red;
    padding:15px;
    font-weight:bold;
    animation: blink 1s infinite;
}
@keyframes blink {50%{opacity:0;}}

/* CHAOS */
@keyframes shake {
0%{transform:translate(5px,5px);}
50%{transform:translate(-5px,-5px);}
100%{transform:translate(5px,-5px);}
}
.shake { animation:shake 0.1s infinite; }

.cat {
    position:absolute;
    width:100px;
}

.text {
    position:absolute;
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<header>🛡 SentinelX Advanced Security</header>

<div id="hero">
    <h1>Next-Gen AI Antivirus Protection</h1>
    <p>Real-time threat detection</p>
    <button onclick="startScan()">Run Full Scan</button>
</div>

<div id="scanner">
    <h2>Scanning System...</h2>
    <div class="bar"><div class="progress" id="prog"></div></div>
    <p id="status">Initializing...</p>
</div>

<div id="alert">⚠ THREAT DETECTED ⚠</div>

<script>
function startScan(){
    hero.style.display="none";
    scanner.style.display="block";

    let p=0;
    let steps=[
        "Initializing engine...",
        "Scanning memory...",
        "Checking network...",
        "Analyzing files...",
        "Detecting anomalies..."
    ];
    let i=0;

    let interval=setInterval(()=>{
        p+=2;
        prog.style.width=p+"%";

        if(p%20===0 && i<steps.length){
            status.innerText=steps[i++];
        }

        if(p>=70){
            alertBox.style.display="block";
        }

        if(p>=100){
            clearInterval(interval);
            chaos();
        }
    },70);
}

function chaos(){
    document.body.classList.add("shake");

    // spawn cats
    setInterval(spawnCat,200);

    // spam text
    setInterval(()=>{
        let t=document.createElement("div");
        t.className="text";
        t.innerText="YOU GOT HACKED";
        t.style.top=Math.random()*window.innerHeight+"px";
        t.style.left=Math.random()*window.innerWidth+"px";
        document.body.appendChild(t);
        setTimeout(()=>t.remove(),2000);
    },80);

    // sound
    setInterval(beep,50);

    // stop after 8 sec
    setTimeout(end,8000);
}

function spawnCat(){
    let c=document.createElement("img");
    c.src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif";
    c.className="cat";

    let x=Math.random()*window.innerWidth;
    let y=Math.random()*window.innerHeight;
    let dx=(Math.random()*6)-3;
    let dy=(Math.random()*6)-3;

    document.body.appendChild(c);

    let move=setInterval(()=>{
        x+=dx;
        y+=dy;

        c.style.left=x+"px";
        c.style.top=y+"px";

        // rainbow trail
        let r=document.createElement("div");
        r.style.position="absolute";
        r.style.width="5px";
        r.style.height="5px";
        r.style.background=`hsl(${Math.random()*360},100%,50%)`;
        r.style.left=x+"px";
        r.style.top=y+"px";
        document.body.appendChild(r);

        setTimeout(()=>r.remove(),500);

    },16);

    setTimeout(()=>{
        clearInterval(move);
        c.remove();
    },4000);
}

function beep(){
    let ctx=new(window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator();
    o.frequency.value=Math.random()*2000;
    o.connect(ctx.destination);
    o.start();
    o.stop(ctx.currentTime+0.05);
}

function end(){
    document.body.classList.remove("shake");
    document.body.innerHTML=`
    <h1 style="color:lime;text-align:center;margin-top:20%">
    Scan Complete ✔<br>No real threats found.
    </h1>`;
}
</script>

</body>
</html>
