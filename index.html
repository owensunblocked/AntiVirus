<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SentinelX Security</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

/* HEADER */
header {
    padding:20px;
    background:#020617;
    border-bottom:1px solid #1e293b;
    font-size:22px;
}

/* HERO */
#hero {
    text-align:center;
    padding:100px 20px;
}

button {
    padding:15px 30px;
    font-size:18px;
    background:#22c55e;
    border:none;
    cursor:pointer;
}

/* SCAN UI */
#scanner {
    display:none;
    text-align:center;
    padding-top:100px;
}

.bar {
    width:60%;
    height:20px;
    background:#1e293b;
    margin:auto;
}

.progress {
    height:100%;
    width:0%;
    background:#22c55e;
}

/* ALERT */
#alert {
    display:none;
    position:fixed;
    top:20px;
    right:20px;
    background:red;
    padding:20px;
    font-weight:bold;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% {opacity:0;}
}

/* RESULTS */
#results {
    display:none;
    text-align:center;
    margin-top:50px;
}
</style>
</head>

<body>

<header>🛡 SentinelX Advanced Security</header>

<div id="hero">
    <h1>Next-Gen AI Antivirus Protection</h1>
    <p>Real-time threat detection and system monitoring</p>
    <button onclick="startScan()">Run Full Scan</button>
</div>

<div id="scanner">
    <h2>Scanning System...</h2>
    <div class="bar"><div class="progress" id="prog"></div></div>
    <p id="status">Initializing...</p>
</div>

<div id="alert">⚠ THREAT DETECTED ⚠</div>

<div id="results">
    <h2>Scan Results</h2>
    <p id="resText"></p>
</div>

<script>
function startScan(){
    document.getElementById("hero").style.display="none";
    document.getElementById("scanner").style.display="block";

    let p=0;
    let prog=document.getElementById("prog");
    let status=document.getElementById("status");

    let steps=[
        "Initializing engine...",
        "Scanning memory...",
        "Checking network...",
        "Analyzing files...",
        "Detecting anomalies..."
    ];

    let i=0;

    let interval=setInterval(()=>{
        p+=2;
        prog.style.width=p+"%";

        if(p%20===0 && i<steps.length){
            status.innerText=steps[i++];
        }

        if(p>=70){
            document.getElementById("alert").style.display="block";
        }

        if(p>=100){
            clearInterval(interval);
            finish();
        }
    },80);
}

function finish(){
    document.getElementById("scanner").style.display="none";
    document.getElementById("results").style.display="block";

    document.getElementById("resText").innerHTML=
    "⚠ Suspicious activity detected<br>Risk Level: HIGH<br><br>(Simulation Demo)";
}
</script>

</body>
</html>
